---
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - convenience_type
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_try
  - identical_operands
  - implicitly_unwrapped_optional
  - last_where
  - legacy_random
  - lower_acl_than_parent
  - modifier_order
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - operator_usage_whitespace
  - override_in_extension
  - overridden_super_call
  - prohibited_interface_builder
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_whitespace_closing_braces
  - yoda_condition
  - strict_fileprivate
  - contains_over_filter_count
  - unowned_variable_capture

disabled_rules:
  - inclusive_language
  - nesting
  - large_tuple
  - opening_brace
  - todo
  - vertical_parameter_alignment
  - unused_setter_value
  - type_body_length
  - implicit_getter
  - function_parameter_count
  - multiple_closures_with_trailing_closure
  - void_function_in_ternary
  - unowned_variable_capture

warning_threshold: 1
indentation: tabs

vertical_whitespace:
  max_empty_lines: 1

included:
  - Sources
excluded:
  - "**/NetworkLayer"

force_cast: error
force_try:
  severity: error

line_length:
  warning: 120
  error: 150 
  ignores_urls: true

type_name:
  max_length: 50
  validate_protocols: false
  excluded:
    - Id
    - Ok

cyclomatic_complexity:
  ignores_case_statements: true

trailing_closure:
  only_single_muted_parameter: true

custom_rules:

  prohibited_global_constants:
    include: "*.swift"
    excluded:
      - "Package.swift"
      - "main.swift"
    name: "Prohibited global constants rule"
    message: "Global constants are prohibited, make it private or use enum"
    regex: '^(?:(?:public|internal)\s+)?(?:let|var)\s+'

  explicit_false:
    include: "*.swift"
    name: "Explicit false rule"
    message: "Use `something == false` instead of `!something`"
    match_kinds:
      - identifier
      - keyword
    regex: '[\t ]+![a-zA-Z_]'

  spacing_before_parenthesis:
    include: "*.swift"
    name: "Spacing before parenthesis rule"
    message: "There should be no space before opening parenthesis"
    match_kinds:
      - identifier
      - keyword
      - typeidentifier
    regex: '\b((func[\w\s]+)|init)\s\('

  required_final:
    include: "*.swift"
    name: "Required `final`"
    message: "Try to use composition over inheritance"
    regex: '^[\t ]*(?:(?:internal|private)[\t ]+)?class[\t ]+(?!(?:func|var|let)[\t ]+)'

  extra_whitespace:
    include: "*.swift"
    name: "Extra whitespace found"
    message: "Check your expression for zero or 2 or more whitespace symbols in a row"
    regex: '(let|var) [\w]+(( {2,}| {0})=( {2,}| {0})| =( {2,}| {0})|( {2,}| {0})= )[\w"]+'

  comments_space:
    name: 'Space After Comment'
    regex: '(^ *//\w+)'
    message: 'There should be a space after //'
    severity: warning

  type_annotation_empty_arrays_dictionaries:
    name: 'Type Annotation for Empty Arrays and Dictionaries'
    regex: '= (?!\[:\])\[[a-zA-Z(), :]+\]\(\)'
    message: 'For empty arrays and dictionaries, use type annotation'
    severity: warning
