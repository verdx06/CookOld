name: CulinarApp

options:
  bundleIdPrefix: ru.vitalijbagautdinov
  xcodeVersion: "26.3"
  deploymentTarget:
    iOS: 18.0

attributes:
  LastUpgradeCheck: "2630"
  BuildIndependentTargetsInParallel: true

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: 4.6.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.15.0

targets:
  CulinarApp:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: Lottie
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" --cache-path "${SRCROOT}/.swiftlint_cache" "${SRCROOT}" || true
          else
            echo "warning: SwiftLint not installed"
          fi
    settings:
      base:
        PRODUCT_NAME: CulinarApp
        PRODUCT_BUNDLE_IDENTIFIER: ru.vitalijbagautdinov.culinarapp
        TARGETED_DEVICE_FAMILY: 1
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        LOCALIZED_STRING_SWIFTUI_SUPPORT: NO
        SWIFT_EMIT_LOC_STRINGS: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: CulinarApp
        UILaunchScreen: {}

  CulinarAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CulinarAppTests
    dependencies:
      - target: CulinarApp
      - package: SnapshotTesting
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ru.vitalijbagautdinov.culinarapp.tests
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        SWIFT_VERSION: 5.10

  CulinarAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CulinarAppUITests
    dependencies:
      - target: CulinarApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ru.vitalijbagautdinov.culinarapp.uitests
        IPHONEOS_DEPLOYMENT_TARGET: 18.5
        SWIFT_VERSION: 5.0
        TEST_TARGET_NAME: CulinarApp

schemes:
  CulinarApp:
    build:
      targets:
        CulinarApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CulinarAppTests
        - CulinarAppUITests
