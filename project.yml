name: CulinarApp

options:
  bundleIdPrefix: ru.vitalijbagautdinov
  xcodeVersion: "26.3"
  deploymentTarget:
    iOS: 18.0

attributes:
  LastUpgradeCheck: "2630"
  BuildIndependentTargetsInParallel: true

targets:
  CulinarApp:
    type: application
    platform: iOS
    sources: [Sources]
    preBuildScripts:
      - name: SwiftLint
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" --path "${SRCROOT}" || true
          else
            echo "warning: SwiftLint not installed"
          fi
    settings:
      base:
        PRODUCT_NAME: CulinarApp
        PRODUCT_BUNDLE_IDENTIFIER: ru.vitalijbagautdinov.culinarapp
        TARGETED_DEVICE_FAMILY: 1
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        SWIFT_VERSION: 5.10
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        LOCALIZED_STRING_SWIFTUI_SUPPORT: NO
        SWIFT_EMIT_LOC_STRINGS: NO
        STRING_CATALOG_GENERATE_SYMBOLS: YES
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: CulinarApp

  CulinarAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CulinarAppTests
    dependencies:
      - target: CulinarApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ru.vitalijbagautdinov.culinarapp.tests
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        SWIFT_VERSION: 5.10

schemes:
  CulinarApp:
    build:
      targets:
        CulinarApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CulinarAppTests
